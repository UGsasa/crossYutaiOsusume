name: Update Stock Data

on:
  schedule:
    # 毎日 日本時間の16:00 (UTCの07:00) に実行
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        # 株価取得用のyfinanceと、JPXのExcelを読み込むためのxlrdをインストール
        run: pip install pandas xlrd yfinance

      - name: Fetch Prices and Generate JSON
        run: |
          python -c "
          import pandas as pd
          import yfinance as yf
          import json
          
          print('1. JPX公式から最新の上場銘柄リストを取得中...')
          url = 'https://www.jpx.co.jp/markets/statistics-equities/misc/tvdivq0000001vg2-att/data_j.xls'
          df = pd.read_excel(url)
          
          # コードと銘柄名（会社名）をペアにして取得
          # ※JPXのExcelにある列名「銘柄名」を使用します
          stock_dict = dict(zip(df['コード'].astype(str), df['銘柄名'].astype(str)))
          codes = list(stock_dict.keys())
          tickers = [c + '.T' for c in codes]
          
          print(f'2. {len(codes)}銘柄の株価を取得中...')
          data = yf.download(tickers, period='1d', threads=True, progress=False)
          
          results = {}
          for code in codes:
              t = code + '.T'
              try:
                  price = data['Close'][t].dropna().iloc[-1]
                  
                  # 価格だけでなく、会社名も一緒にJSONに格納します
                  results[code] = {
                      'name': stock_dict[code],
                      'price': float(price)
                  }
              except:
                  continue
          
          with open('data.json', 'w') as f:
              json.dump(results, f, ensure_ascii=False) # 日本語が文字化けしないように保存
              
          print('3. 会社名と価格が入ったdata.jsonの生成が完了しました！')
          "

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # 差分がある場合のみコミットしてプッシュする
          git commit -m '📈 株価データを自動更新' || exit 0
          git push
