<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>crossYutaiOsusume</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="crossYutaiOsusume">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <style>
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px;
      max-width: 600px;
      margin: auto;
    }

    h1 {
      font-size: 1.5em;
      text-align: center;
    }

    label {
      display: block;
      margin: 10px 0 5px;
    }

    .input-container {
      display: flex;
      align-items: center;
      gap: 5px;
      justify-content: center;
    }

    .container {
      display: flex;
      justify-content: space-around;
    }

    input {
      width: 80px;
      text-align: right;
      padding: 5px;
      font-size: 1em;
    }

    ul {
      padding: 0;
      list-style: none;
    }

    li {
      background: #f9f9f9;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
    }

    div {
      white-space: nowrap;
      overflow-x: auto;
    }

    #business-days-list li {
      margin-bottom: 15px;
      list-style: none;
    }

    #business-days-list li div {
      max-height: 400px;
      overflow-y: auto;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background-color: #f9f9f9;
    }

    .push-panel.hidden {
      display: none;
    }
  </style>
</head>

<body>
  <h2>貸株料の効率:SBI/楽天(短期)</h2>
  <p>※1 貸株料率は年利3.9%の前提で計算 </br> ※2 SBIはフライングクロス日</p>
  <strong>
    <font color="blue">実際は下記日付の前営業日19時から注文可</font>
  </strong>
  <p>×のついた日の次の日にポジションを取るのが相対的には効率良い気がする。</p>
  <div class="container">
    <a href="javascript:void(0);" onclick="OnLinkClick(1);">
      <font color="#ED174D">SMBC日興証券に切替</font>
    </a>
    <a href="javascript:void(0);" onclick="OnLinkClick(2);">
      <font color="#BF0000">楽天(長期)に切替</font>
    </a>
  </div>
  <div class="input-container">
    <label for="inputValue">金額:</label>
    <input type="number" id="inputValue" value="20" oninput="updateDisplay()" onfocus="this.select();">
    <label for="inputValue">万円</label>
  </div>
  <ul id="business-days-list"></ul>

  <!-- プッシュ通知設定パネル -->
  <div id="pushPanel" class="push-panel hidden"
    style="margin-top: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; background: #f0f8ff; text-align: center;">
    <h3 style="margin-top: 0;">プッシュ通知設定</h3>
    <p id="pushStatus" style="font-size: 0.9em; color: #333;">読み込み中...</p>
    <button id="enablePushBtn"
      style="padding: 10px 20px; font-size: 1em; cursor: pointer; background-color: #007aff; color: white; border: none; border-radius: 5px;">通知を有効化する</button>
  </div>

  <script>
    let myurl = new URL(window.location.href);
    let params = myurl.searchParams;
    let value = params.get('inputValue');
    if (!value) value = 20;
    document.getElementById('inputValue').value = value;

    const holidaysApiUrl = "https://holidays-jp.github.io/api/v1/date.json";
    const workerUrl = "https://wild-fire-0595.yszimmer0207.workers.dev";
    const vapidPublicKey = "BOEGQ9vF1HqXOCkw3s-rAetWgwpsODZso1noV1v0f7LN5Owf13tmnqpLjjizMYh6GsGWOBTLKf8nJlrCbWx1Trs";
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

    // DOM要素の取得はHTMLロード後に確実に行うため、ここで再度行います
    const pushPanel = document.getElementById('pushPanel');
    const statusEl = document.getElementById('pushStatus');
    const enablePushBtn = document.getElementById('enablePushBtn');

    if (pushPanel) pushPanel.classList.toggle('hidden', !isStandalone);
    if (isStandalone && statusEl) statusEl.textContent = 'PWA起動を確認しました。';

    function setPushStatus(message) {
      if (statusEl) statusEl.textContent = message;
    }

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
      return outputArray;
    }

    enablePushBtn?.addEventListener('click', async () => {
      try {
        if (!('Notification' in window)) {
          setPushStatus('Notification API が使えません。');
          return;
        }
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') {
          setPushStatus('通知が許可されませんでした。');
          return;
        }
        if (!('serviceWorker' in navigator)) {
          setPushStatus('Service Worker が使えません。');
          return;
        }

        const registration = await navigator.serviceWorker.register('./sw.js');

        // すでに登録されている場合はreadyを待つ
        await navigator.serviceWorker.ready;

        const subscription = await registration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(vapidPublicKey),
        });
        const payload = subscription.toJSON ? subscription.toJSON() : subscription;
        setPushStatus(`PushSubscription を取得しました。\n\n${JSON.stringify(payload, null, 2)}`);

        if (workerUrl && !workerUrl.includes('YOUR_CLOUDFLARE_WORKER_URL')) {
          // Cloudflare Workerのルートへ直接POSTします
          const res = await fetch(workerUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || `Worker error: ${res.status}`);
          setPushStatus(`PushSubscription をWorkerへ送信しました。\n\n${JSON.stringify(data, null, 2)}`);
        }
      } catch (error) {
        console.error(error);
        setPushStatus(`通知初期化でエラーが発生しました。\n${error?.message || error}`);
      }
    });

    async function getBusinessDaysForNext13Months() {
      const currentYear = new Date().getFullYear();
      const holidays = await fetchHolidays([currentYear, currentYear + 1]);
      const businessDaysList = [];
      const kijyuntoday = new Date();
      kijyuntoday.setHours(0, 0, 0, 0);

      const calendarToday = new Date();
      calendarToday.setHours(0, 0, 0, 0);

      const effectiveToday = await getEffectiveToday(holidays);

      for (let monthOffset = 0; monthOffset < 6; monthOffset++) {
        const currentMonth = new Date(kijyuntoday);
        currentMonth.setDate(1);
        currentMonth.setMonth(currentMonth.getMonth() + monthOffset);

        const lastBusinessDay = await getLastBusinessDayOfMonth(currentMonth.getFullYear(), currentMonth.getMonth(), holidays);
        const oneBusinessDayBefore = await getNthBusinessDayBefore(lastBusinessDay, 1, holidays);
        const twoBusinessDaysBefore = await getNthBusinessDayBefore(lastBusinessDay, 2, holidays);
        const B = await getNthBusinessDayAfter(oneBusinessDayBefore, 2, holidays);

        const today_plus_2 = await getNthBusinessDayAfter(effectiveToday, 2, holidays);
        const today_daysDifference = Math.abs(calculateDaysBetween(today_plus_2, B)) + 1;
        const A_start = twoBusinessDaysBefore;

        const A_Days = [];
        let previousDaysDifference = null;
        let i = 1;

        while (true) {
          const A = await getNthBusinessDayBefore(oneBusinessDayBefore, i, holidays);
          if (A < calendarToday) break;
          const A_plus_2 = await getNthBusinessDayAfter(A, 2, holidays);
          const daysDifference = Math.abs(calculateDaysBetween(A_plus_2, B)) + 1;
          let mark = "";
          if (previousDaysDifference !== null && daysDifference - previousDaysDifference >= 2) mark = " ";
          A_Days.push({ A: formatDate(A), A_plus_2: formatDate(A_plus_2), daysDifference, mark });
          previousDaysDifference = daysDifference;
          i++;
        }

        A_Days.push({
          A: formatDate(effectiveToday),
          A_plus_2: formatDate(today_plus_2),
          daysDifference: today_daysDifference,
          mark: "",
        });

        businessDaysList.push({
          month: currentMonth.getMonth() + 1,
          year: currentMonth.getFullYear(),
          lastBusinessDay: formatDate(lastBusinessDay),
          oneBusinessDayBefore: formatDate(oneBusinessDayBefore),
          twoBusinessDaysBefore: formatDate(twoBusinessDaysBefore),
          B: formatDate(B),
          A_start: formatDate(A_start),
          A_Days,
        });
      }

      await displayBusinessDays(businessDaysList, holidays);
    }

    async function fetchHolidays(years) {
      const response = await fetch(holidaysApiUrl);
      const holidays = await response.json();
      return Object.keys(holidays).filter(date => years.includes(new Date(date).getFullYear()));
    }

    async function getNthBusinessDayBefore(date, n, holidays) {
      let tempDate = new Date(date);
      while (n > 0) {
        tempDate.setDate(tempDate.getDate() - 1);
        if (!isWeekend(tempDate) && !isHoliday(tempDate, holidays) && !isNewYearEve(tempDate)) n--;
      }
      return tempDate;
    }

    async function getNthBusinessDayAfter(date, n, holidays) {
      let tempDate = new Date(date);
      while (n > 0) {
        tempDate.setDate(tempDate.getDate() + 1);
        if (!isWeekend(tempDate) && !isHoliday(tempDate, holidays) && !isNewYearEve(tempDate)) n--;
      }
      return tempDate;
    }

    function isWeekend(date) {
      return date.getDay() === 0 || date.getDay() === 6;
    }

    function isHoliday(date, holidays) {
      return holidays.includes(formatDate(date));
    }

    function isNewYearEve(date) {
      return date.getMonth() === 11 && date.getDate() === 31;
    }

    async function getLastBusinessDayOfMonth(year, month, holidays) {
      const lastDay = new Date(year, month + 1, 0);
      while (isWeekend(lastDay) || isHoliday(lastDay, holidays) || isNewYearEve(lastDay)) {
        lastDay.setDate(lastDay.getDate() - 1);
      }
      return lastDay;
    }

    function formatDate(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function calculateDaysBetween(dateA, dateB) {
      return Math.floor((dateA - dateB) / (1000 * 60 * 60 * 24));
    }

    async function getEffectiveToday(holidays) {
      const now = new Date();
      let today = new Date(now);
      today.setHours(0, 0, 0, 0);
      if (now.getHours() > 15 || (now.getHours() === 15 && now.getMinutes() >= 30)) {
        today = await getNthBusinessDayAfter(today, 1, holidays);
      }
      return today;
    }

    async function displayBusinessDays(businessDays, holidays) {
      const listElement = document.getElementById('business-days-list');
      const span = document.getElementById('oneDayCost');
      listElement.innerHTML = "";

      const inputValue = parseFloat(document.getElementById('inputValue').value) * 10000;

      if (span) {
        if (inputValue && !isNaN(inputValue)) {
          const inputValueKai = Math.floor(inputValue * 0.0327 / 365 * 1);
          span.textContent = `(${inputValueKai}円)`;
        } else {
          span.textContent = "";
        }
      }

      const effectiveToday = await getEffectiveToday(holidays);
      const effectiveTodayStr = formatDate(effectiveToday);

      businessDays.forEach(item => {
        const li = document.createElement('li');
        let text = `<strong>${item.year}年${item.month}月</strong><br>
          最終営業日: ${item.A_start} / 1営業日前: ${item.oneBusinessDayBefore}<br>`;

        item.A_Days.forEach((AData, index) => {
          const calculatedValue = inputValue ? Math.floor(inputValue * 0.0327 / 365 * 1 + inputValue * 0.019 / 365 * AData.daysDifference) : "";
          let displayDate = AData.A;
          if (AData.A === effectiveTodayStr) {
            displayDate = `<span style="color:red; font-weight:bold;">${AData.A}</span>`;
          }
          text += `対象日: ${displayDate} (${AData.daysDifference}日) ${calculatedValue ? ` -- ${calculatedValue}円` : ""}${AData.mark}<br>`;
          if (index === item.A_Days.length - 2) {
            text += `<hr><strong>SBI実行時刻</strong><br><hr>`;
          }
        });

        const div = document.createElement('div');
        div.innerHTML = text.trim();
        li.appendChild(div);
        listElement.appendChild(li);
      });
    }

    function updateDisplay() {
      getBusinessDaysForNext13Months();
    }

    function OnLinkClick(type) {
      let sampleParams = new URLSearchParams();
      let element = document.getElementById('inputValue');
      sampleParams.set("inputValue", element.value);
      let url = "";
      if (type === 0) {
        url = `./index.html?${sampleParams.toString()}`;
      } else if (type === 1) {
        url = `./forSmbc.html?${sampleParams.toString()}`;
      } else {
        url = `./forRakutenMukigen.html?${sampleParams.toString()}`;
      }
      window.location.href = url;
      return false;
    }

    getBusinessDaysForNext13Months();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.log('Service Worker registration failed', err));
      });
    }
  </script>
</body>

</html>
